name: CI/CD

on:
  push:
    branches:
      - main

# Queue runs instead of overlapping: a deploy must never race a
# migration apply from a newer commit.
concurrency:
  group: main-pipeline
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Hasura migrations & metadata
    runs-on: ubuntu-latest
    env:
      HASURA_URL: https://smol-hasura.fly.dev
      HASURA_ADMIN_SECRET: ${{ secrets.HASURA_ADMIN_SECRET }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Apply Migrations
        run: pnpm ci:migrate-apply

      - name: Apply Metadata
        run: pnpm ci:metadata-apply

      - name: Reload Metadata
        run: pnpm ci:metadata-reload

  # Must be the LAST job in the pipeline: the go server reads tables that the
  # Hasura migrations above create, so it only ships once they have applied.
  # Any future job added to this workflow should be wired into `needs` here.
  deploy-go-server:
    name: Deploy go server to Fly
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-server/go.mod

      - name: Vet and build all modules
        working-directory: go-server
        run: |
          for module in . poe data pob; do
            (cd "$module" && go vet ./... && go build ./... && go test ./...)
          done

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: go-server
        run: flyctl deploy --remote-only
        env:
          # org-scoped token, shared with the hasura deployment
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
