# fly.toml app configuration file generated for smol-go-server on 2024-03-20T17:05:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smol-go-server'
primary_region = 'lhr'

# extra headroom on top of the 1gb VM below for headless PoB spikes (~230-330MB
# peak per character after the eager-GC fix in extract-stats.lua; rare tree/
# jewel combos can spike higher) — bumped from a 512mb VM after PoB runs
# started reliably missing the 90s timeout, most likely from swap thrashing
swap_size_mb = 512

[build]
  [build.args]
    GO_VERSION = '1.22.1'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  # The periodic ladder sync + PoB stats sweep need a machine actually running
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
