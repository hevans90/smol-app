table:
  name: character
  schema: public
object_relationships:
  - name: stats
    using:
      foreign_key_constraint_on:
        column: character_id
        table:
          name: character_stats
          schema: public
select_permissions:
  - role: dev
    permission:
      columns:
        - challenges
        - class
        - dead
        - experience
        - id
        - league
        - level
        - name
        - poe_account_name
        - rank
        - retired
        - twitch
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - challenges
        - class
        - dead
        - experience
        - id
        - league
        - level
        - name
        - poe_account_name
        - rank
        - retired
        - twitch
      filter: {}
    comment: ""
