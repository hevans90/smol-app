table:
  name: user
  schema: public
array_relationships:
  - name: user_item_orders
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_item_order
          schema: public
  - name: user_league_mechanics
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_league_mechanic
          schema: public
select_permissions:
  - role: dev
    permission:
      columns:
        - admin
        - discord_avatar
        - discord_name
        - discord_user_id
        - guild
        - poe_name
        - poe_user_id
        - id
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - admin
        - discord_avatar
        - discord_name
        - discord_user_id
        - guild
        - id
        - poe_name
        - poe_user_id
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: dev
    permission:
      columns:
        - admin
        - discord_avatar
        - discord_name
        - discord_user_id
        - guild
        - poe_name
        - poe_user_id
        - id
      filter:
        _exists:
          _table:
            name: user
            schema: public
          _where:
            _and:
              - id:
                  _eq: X-Hasura-User-Id
              - admin:
                  _eq: true
      check:
        _or:
          - id:
              _neq: X-Hasura-User-Id
          - admin:
              _eq: true
    comment: dev updates (incl. assigning admins) require a CURRENT admin flag,
      so revoking admin takes effect immediately even with an unexpired dev
      JWT; the check stops admins removing their OWN admin flag
  - role: user
    permission:
      columns:
        - guild
      filter:
        id:
          _eq: X-Hasura-User-Id
      check: null
    comment: ""
delete_permissions:
  - role: dev
    permission:
      filter: {}
    comment: ""
  - role: user
    permission:
      filter:
        id:
          _eq: X-Hasura-User-Id
    comment: ""
