subscription LeagueCharacters($leagueName: String) {
  character(order_by: { rank: asc }, where: { league: { _eq: $leagueName } }) {
    twitch
    retired
    poe_account_name
    rank
    name
    level
    id
    experience
    dead
    class
    challenges
    stats {
      main_skill
      combined_dps
      life
      energy_shield
      total_ehp
      updated_at
    }
  }
}
